# Application Name
spring.application.name=employee-management

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/employeedb
spring.datasource.username=postgres
spring.datasource.password=sohini
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8089

# JPA Database Platform Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ReDoc and Swagger UI Configuration
springdoc.redoc.enabled=true
springdoc.redoc.path=/redoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/excelfore-ui
springdoc.swagger-ui.operationsSorter=method
logging.level.org.springdoc=DEBUG

# External API Base URL Configuration
external.api.base-url=http://localhost:8089
